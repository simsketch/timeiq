<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Clock face -->
  <circle cx="16" cy="17" r="9" stroke="white" stroke-width="1.8" fill="none" stroke-opacity="0.9"/>
  <!-- Hour hand (pointing to 10) -->
  <line x1="16" y1="17" x2="12.5" y2="13" stroke="white" stroke-width="2" stroke-linecap="round" stroke-opacity="0.95"/>
  <!-- Minute hand (pointing to 2) -->
  <line x1="16" y1="17" x2="21" y2="12" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.9"/>
  <!-- Center dot -->
  <circle cx="16" cy="17" r="1.5" fill="white"/>
  <!-- Top marker (12 o'clock) -->
  <line x1="16" y1="9.5" x2="16" y2="11" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.7"/>
</svg>
