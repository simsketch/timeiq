<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <defs>
    <linearGradient id="bg" x1="2" y1="2" x2="38" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="hsl(280 80% 64%)"/>
      <stop offset="50%" stop-color="hsl(248 82% 62%)"/>
      <stop offset="100%" stop-color="hsl(192 90% 58%)"/>
    </linearGradient>
    <linearGradient id="shine" x1="4" y1="4" x2="22" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="inner" cx="0.5" cy="0.35" r="0.65">
      <stop offset="0%" stop-color="white" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="face" x1="12" y1="10" x2="28" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="white" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.78"/>
    </linearGradient>
  </defs>
  <!-- Aurora base -->
  <rect x="2" y="2" width="36" height="36" rx="11" fill="url(#bg)"/>
  <rect x="2" y="2" width="36" height="36" rx="11" fill="url(#shine)"/>
  <rect x="2" y="2" width="36" height="36" rx="11" fill="url(#inner)"/>
  <!-- Top highlight -->
  <path d="M11 3.5 H29 a7.5 7.5 0 0 1 7.5 7.5" stroke="white" stroke-opacity="0.42" stroke-width="0.6" stroke-linecap="round" fill="none"/>
  <!-- Glass clock face -->
  <circle cx="20" cy="20.5" r="9.5" fill="url(#face)"/>
  <circle cx="20" cy="20.5" r="9.5" stroke="white" stroke-opacity="0.65" stroke-width="0.6"/>
  <!-- Tick marks -->
  <circle cx="20" cy="12.5" r="0.9" fill="hsl(248 82% 55%)"/>
  <circle cx="28" cy="20.5" r="0.65" fill="hsl(248 82% 55%)" fill-opacity="0.7"/>
  <circle cx="20" cy="28.5" r="0.65" fill="hsl(248 82% 55%)" fill-opacity="0.7"/>
  <circle cx="12" cy="20.5" r="0.65" fill="hsl(248 82% 55%)" fill-opacity="0.7"/>
  <!-- Hour hand -->
  <line x1="20" y1="20.5" x2="16.5" y2="17" stroke="hsl(232 40% 18%)" stroke-width="2" stroke-linecap="round"/>
  <!-- Minute hand -->
  <line x1="20" y1="20.5" x2="24.8" y2="15.8" stroke="hsl(248 82% 55%)" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Center pivot -->
  <circle cx="20" cy="20.5" r="1.5" fill="white"/>
  <circle cx="20" cy="20.5" r="1.5" stroke="hsl(248 82% 55%)" stroke-width="0.5"/>
  <circle cx="20" cy="20.5" r="0.55" fill="hsl(248 82% 55%)"/>
</svg>
